version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: paytrack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-paytrack}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-paytrack_secret}
      POSTGRES_DB: ${POSTGRES_DB:-paytrack}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-paytrack} -d ${POSTGRES_DB:-paytrack}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    shm_size: 256mb

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: paytrack_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@paytrack.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pg_data:
    driver: local
  pgadmin_data:
    driver: local
